<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1200" viewBox="0 0 2000 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b6b3a"/>
      <stop offset="50%" stop-color="#1f8f56"/>
      <stop offset="100%" stop-color="#a7e1b1"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#g)"/>

  <!-- decorative diagonal shapes -->
  <g opacity="0.12" fill="#ffffff">
    <path d="M0 300 L2000 0 L2000 150 L0 450 Z"/>
    <path d="M0 700 L2000 400 L2000 600 L0 1000 Z"/>
  </g>

  <!-- subtle pattern -->
  <g opacity="0.06" fill="#fff">
    <circle cx="300" cy="200" r="220"/>
    <circle cx="1600" cy="900" r="350"/>
  </g>

  <!-- small leaf icon (stylized) -->
  <g transform="translate(1600,140) scale(1.4)" fill="#ffffff" opacity="0.9">
    <path d="M-20 40 C-10 10 30 -10 80 0 C40 10 10 30 -20 40 Z"/>
    <path d="M10 60 C30 40 80 40 120 80 C80 60 40 80 10 60 Z" opacity="0.9"/>
  </g>

</svg>
