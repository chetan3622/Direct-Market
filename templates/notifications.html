{% extends "base.html" %}
{% block content %}
<h2>Notifications</h2>

{% for note in notifications %}
    <div class="alert alert-info">
        {{ note.message }}
        {% if not note.is_read %}
            <span class="badge bg-danger">New</span>
        {% endif %}
    </div>
{% endfor %}

<a href="{{ url_for('seller_dashboard') }}" class="btn btn-primary">Back to Home</a>
{% endblock %}
