{% extends "base.html" %}
{% block content %}

<style>
.register-page {
    margin: -1.5rem calc(50% - 50vw) -2rem;
    min-height: calc(100vh - 76px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background:
        linear-gradient(rgba(15, 61, 36, 0.72), rgba(15, 61, 36, 0.72)),
        url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=2000&q=80");
    background-size: cover;
    background-position: center;
}

.register-card {
    border-radius: 12px;
    box-shadow: 0px 16px 36px rgba(0,0,0,0.22);
    animation: slideIn 1s ease-out;
    backdrop-filter: blur(2px);
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="register-page">
    <div class="card register-card col-md-6 col-lg-4 p-4">
        
        <h2 class="text-center text-success mb-4">
            <i class="bi bi-pencil-square"></i> Register
        </h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="name" class="form-control"
                    placeholder="Full Name" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control"
                    placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control"
                    placeholder="Password" required>
            </div>
            <div class="mb-3">
                <select name="role" class="form-select" required>
                    <option value="">Select Role</option>
                    <option value="buyer">Buyer</option>
                    <option value="seller">Seller</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100">Register</button>
        </form>

        <p class="text-center mt-3">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </p>

    </div>
</div>

{% endblock %}
